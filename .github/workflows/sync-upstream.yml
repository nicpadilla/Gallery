name: Sync upstream and build

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        id: sync
        run: |
          git remote add upstream https://github.com/FossifyOrg/Gallery.git || true
          git fetch upstream main

          BEFORE=$(git rev-parse HEAD)
          git rebase upstream/main
          AFTER=$(git rev-parse HEAD)

          if [ "$BEFORE" != "$AFTER" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.sync.outputs.changed == 'true'
        run: git push --force-with-lease

  build:
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleFossDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gallery-foss-debug
          path: app/build/outputs/apk/foss/debug/*.apk
          retention-days: 30
